<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0f13" />
  <title>Forge · Workout Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- ============ Views ============ -->
    <main class="screen" id="screen"></main>

    <!-- Resume-active banner -->
    <button class="resume-bar" id="resumeBar" hidden></button>

    <!-- ============ Bottom navigation ============ -->
    <nav class="tabbar">
      <button class="tab tab--on" data-view="home">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10"/></svg>
        <span>Home</span>
      </button>
      <button class="tab" data-view="routines">
        <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        <span>Routines</span>
      </button>
      <button class="tab tab--start" data-action="quick-start">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="tab" data-view="history">
        <svg viewBox="0 0 24 24"><path d="M12 8v4l3 2M21 12a9 9 0 1 1-9-9 9 9 0 0 1 9 9z"/></svg>
        <span>History</span>
      </button>
      <button class="tab" data-view="stats">
        <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
        <span>Stats</span>
      </button>
    </nav>
  </div>

  <!-- ============ Active workout overlay ============ -->
  <section class="logger" id="logger" hidden></section>

  <!-- ============ Exercise picker overlay ============ -->
  <section class="picker" id="picker" hidden></section>

  <!-- ============ Generic modal ============ -->
  <div class="modal" id="modal" hidden></div>

  <!-- ============ Rest timer toast ============ -->
  <div class="rest" id="rest" hidden>
    <button class="rest__adj" data-rest="-15">−15</button>
    <div class="rest__face">
      <span class="rest__label">REST</span>
      <span class="rest__time" id="restTime">1:30</span>
    </div>
    <button class="rest__adj" data-rest="15">+15</button>
    <button class="rest__skip" id="restSkip">Skip</button>
  </div>

  <!-- ============ Toast ============ -->
  <div class="toast" id="toast" hidden></div>

  <script src="db.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
